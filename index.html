<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Site Ebook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="Logo Site">
            <h1>NomDuSite</h1>
        </div>
        <input type="text" id="searchBar" placeholder="Rechercher un ebook...">
    </header>

    <nav class="categories">
        <button onclick="filterGenre('Fiction')">Fiction</button>
        <button onclick="filterGenre('Business')">Business</button>
        <button onclick="filterGenre('Développement')">Développement</button>
        <button onclick="filterGenre('Science')">Science</button>
    </nav>

    <main id="ebooksContainer">
        <!-- Les ebooks seront injectés ici par JS -->
    </main>

    <script src="script.js"></script>
</body>
</html>
